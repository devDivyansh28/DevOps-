name: Deploy nodejs code on ExCloud

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: checkout Code
              uses: actions/checkout@v4

            - name: Deploy on ExCloud
              uses: appleBoy/ssh-action@v1.0.3
              with:
                host: 210.79.129.233
                username: ubuntu
                key: ${{ secrets.PRIVATE_KEY}}
                script:
                    cd /home/ubuntu/DevOps-
                    git pull
                    npm install
                    pm2 restart 0