name: Deploy nodejs code on ExCloud

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: checkout Code
              uses: actions/checkout@v4

            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}  
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
         
            - name: Docker Build and Push
              run: | 
                docker build -t divyansh576dev/devops-first .
                docker push divyansh576dev/devops-first

            - name: Deploy on ExCloud
              uses: appleBoy/ssh-action@v1.0.3
              with:
                host: 210.79.129.233
                username: ubuntu
                key: ${{ secrets.PRIVATE_KEY}}
                script: |
                   #Kill the existing docker container
                   sudo docker rm -f devops-first || true

                   #Again pull the latest image from Docker Hub
                    sudodocker pull divyansh576dev/devops-first

                   #Run the container -d -p 8000:8000  divyansh576dev/devops-first
                     sudo docker run -d -p 8000:8000 --name devops-first divyansh576dev/devops-first

                    #clenan up the unused images
                        sudo docker image prune -f